; ============================================================================
; 履带车视觉跟随系统 — ESP32-WROOM-32U DevKit V1 L2 决策层
; PlatformIO configuration — espressif32 platform, Arduino framework
; ============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_port = COM9
monitor_speed = 115200

upload_port = COM9
upload_speed = 460800
