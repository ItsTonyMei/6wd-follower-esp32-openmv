; ============================================================================
; 履带车视觉跟随系统 — STM32F103C8T6 L3 执行与安全层
; 芯片丝印: STM32F103C8T6 (ARM Cortex-M3, 72MHz, 64KB Flash, 20KB SRAM)
; PlatformIO configuration — ststm32 platform, Arduino framework
; ============================================================================

[env:genericSTM32F103CB]
platform = ststm32
board = genericSTM32F103CB
framework = arduino

; 上传配置 — 通过 CH9102 USB-UART (COM11), 使用内置串口 bootloader
; 参数经 FlyMcu 验证: 76800 bps, DTR→NRST (低=复位), RTS→BOOT0 (高=Bootloader)
; 序列: DTR=低(复位) → RTS=高(BOOT0=1) → 100ms → DTR=高(释放复位), RTS 保持高
upload_protocol = serial
upload_port = COM11
; stm32flash 实测可用: 115200 + 400ms 额外延迟 (bootloader v2.2, PID 0x0410 Medium-density)
upload_speed = 115200

upload_flags =
    -b
    115200
    -i
    -dtr,rts,dtr,,,,

; 串口监控
monitor_port = COM11
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; 编译选项
build_flags =
    -D HAL_UART_MODULE_ENABLED

; 调试配置 (预留, 当前无 ST-Link)
; debug_tool = stlink
; debug_init_break = tbreak setup
