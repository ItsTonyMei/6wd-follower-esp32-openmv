; ============================================================================
; 履带车视觉跟随系统 — STM32F103CB L3 执行与安全层
; PlatformIO configuration — ststm32 platform, Arduino framework
; ============================================================================

[env:genericSTM32F103CB]
platform = ststm32
board = genericSTM32F103CB
framework = arduino

; 上传配置 — 通过 CH9102 USB-UART (COM11), 使用内置串口 bootloader
upload_protocol = serial
upload_port = COM11
upload_speed = 115200

; bootloader 进入: RTS=1 (BOOT0), DTR 脉冲低 (NRST)
; PlatformIO 默认 Maple 复位: RTS→NRST, DTR→BOOT0 — 我们的板子是反的
; 所以用 stm32flash 自定义方式: -i rts,-dtr,dtr
; (先置 RTS=1 拉高 BOOT0, 然后 DTR 脉冲复位)
upload_flags =
    -b
    115200
    -i
    rts,-dtr,dtr

; 串口监控
monitor_port = COM11
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; 编译选项
build_flags =
    -D HAL_UART_MODULE_ENABLED

; 调试配置 (预留, 当前无 ST-Link)
; debug_tool = stlink
; debug_init_break = tbreak setup
